# Reference config for the Zigbee2MQTT add-on.
# Copy into the add-on's data directory; create secret.yaml beside it
# with mqtt_username / mqtt_password (see secrets.yaml.example).
homeassistant:
  enabled: true

mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://core-mosquitto:1883
  user: '!secret mqtt_username'
  password: '!secret mqtt_password'

serial:
  # "Zigbee 3.0 USB Dongle Plus" MG24 (Silicon Labs EFR32MG24).
  # Verify the real path on the box (Settings > System > Hardware) and prefer
  # the stable by-id path — MG24 dongles usually enumerate as ttyACM0, some as
  # ttyUSB0 depending on the USB-serial chip.
  port: /dev/ttyACM0
  adapter: ember

frontend:
  enabled: true
  port: 8099

advanced:
  channel: 20
  network_key: GENERATE
  last_seen: ISO_8601

permit_join: false
