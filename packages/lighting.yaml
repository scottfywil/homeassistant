# Presence lighting driven by the office multisensor ESP32 board:
# PIR = instant ON, mmWave radar = honest OFF (holds while someone sits still).
# Clone this pattern per room; swap entity IDs. (docs/08-presence-sensors.md)
automation:
  - alias: "Lighting - Office on motion when dark"
    id: lighting_office_motion_on
    triggers:
      - trigger: state
        entity_id: binary_sensor.office_sensor_motion
        to: "on"
    conditions:
      - condition: numeric_state
        entity_id: sensor.office_sensor_illuminance
        below: 40
    actions:
      - action: light.turn_on
        target:
          entity_id: light.office

  - alias: "Lighting - Office off when presence clears"
    id: lighting_office_presence_off
    triggers:
      - trigger: state
        entity_id: binary_sensor.office_sensor_presence
        to: "off"
        for: "00:05:00"
    actions:
      - action: light.turn_off
        target:
          entity_id: light.office
