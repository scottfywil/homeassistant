# Prusa Lamp follows print activity (Workout Room).
# Lamp ON while EITHER printer is printing; OFF when NEITHER has an active job.
# Also re-evaluates on Home Assistant start so the lamp self-corrects after a
# reboot mid-print.
#
# ⚠️ VERIFY these 3 entity IDs against the live registry (Developer Tools →
# States) before trusting this — they are ASSUMED from OctoPrint naming
# conventions, not yet confirmed on the box. Note the lesson from the cabinet
# package: an OctoPrint entity_id keeps its ORIGINAL setup-time slug even if the
# device was later renamed, so the friendly name is not a reliable guide.
#   Prusa Mini  printing : binary_sensor.prusa_mini_printing
#   Prusa MK3S+ printing : binary_sensor.prusa_mk3s_printing
#   Prusa Lamp           : light.prusa_lamp
# The turn on/off actions use homeassistant.turn_on/off so they work whether the
# lamp is a light.* or a switch.*/plug entity — but the entity_id (domain
# included) must still be correct. Fix any that differ, then this is live.
#
# OctoPrint's "Printing" binary_sensor is OFF while a job is paused. If a paused
# job should also keep the lamp on, switch the triggers/conditions to the
# "Current State" sensor instead (state in [Printing, Paused, Pausing]).
automation:
  - alias: "Workout - Prusa Lamp follows print jobs"
    id: workout_prusa_lamp_follow
    mode: restart
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.prusa_mini_printing
          - binary_sensor.prusa_mk3s_printing
      - trigger: homeassistant
        event: start
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id:
                  - binary_sensor.prusa_mini_printing
                  - binary_sensor.prusa_mk3s_printing
                match: any
                state: "on"
            sequence:
              - action: homeassistant.turn_on
                target:
                  entity_id: light.prusa_lamp
        default:
          - action: homeassistant.turn_off
            target:
              entity_id: light.prusa_lamp
